{% if include.items and include.items.size > 0 %}
  {% assign media_label = include.label | default: "Media coverage" %}
  <p class="publication__media-coverage">{{ media_label }}: {% for item in include.items %}<a href="{{ item.url }}" target="_blank" rel="noopener">{{ item.outlet }}</a>{% unless forloop.last %}; {% endunless %}{% endfor %}</p>
{% endif %}
