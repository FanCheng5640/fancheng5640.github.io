name: Sync scholarly data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync publications from ORCID
        run: python .github/scripts/sync_orcid_publications.py

      - name: Sync Google Scholar citation metrics
        run: python .github/scripts/sync_google_scholar.py

      - name: Commit updated scholarly data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data _publications files/papers
          if git diff --cached --quiet; then
            echo "No scholarly data updates."
          else
            git commit -m "Sync scholarly data"
            git push
          fi
